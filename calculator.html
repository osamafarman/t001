<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الآلة الحاسبة — ثلاثية</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0d14;
    --panel: #13131f;
    --btn: #1c1c2e;
    --btn-hover: #252538;
    --accent: #c084fc;
    --accent2: #a855f7;
    --op: #7c3aed;
    --eq: linear-gradient(135deg, #c084fc, #7c3aed);
    --text: #f0f0f8;
    --muted: #666;
    --display-bg: #0a0a12;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    font-family: 'Tajawal', sans-serif;
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse 70% 50% at 50% 0%, rgba(192,132,252,0.1) 0%, transparent 60%);
    pointer-events: none;
  }

  nav {
    position: fixed;
    top: 1.5rem;
    right: 1.5rem;
    z-index: 10;
  }
  nav a {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    color: var(--muted);
    text-decoration: none;
    font-size: 0.85rem;
    padding: 0.5rem 1rem;
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 50px;
    background: rgba(255,255,255,0.03);
    transition: color 0.2s, border-color 0.2s;
  }
  nav a:hover { color: var(--accent); border-color: rgba(192,132,252,0.3); }

  .calc-wrapper {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 380px;
  }

  .calc-title {
    text-align: center;
    margin-bottom: 1.5rem;
    animation: fadeDown 0.6s ease both;
  }
  .calc-title h1 { font-size: 1.5rem; font-weight: 900; color: var(--accent); }
  .calc-title p { font-size: 0.8rem; color: var(--muted); margin-top: 0.25rem; }

  .calculator {
    background: var(--panel);
    border-radius: 24px;
    padding: 1.5rem;
    border: 1px solid rgba(192,132,252,0.15);
    box-shadow: 0 40px 80px rgba(0,0,0,0.5), 0 0 60px rgba(192,132,252,0.05);
    animation: fadeUp 0.6s ease both;
    animation-delay: 0.1s;
  }

  .display {
    background: var(--display-bg);
    border-radius: 16px;
    padding: 1.25rem 1.5rem;
    margin-bottom: 1.5rem;
    border: 1px solid rgba(255,255,255,0.05);
    min-height: 110px;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    align-items: flex-end;
  }
  .display .expression {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.85rem;
    color: var(--muted);
    min-height: 1.4em;
    word-break: break-all;
    text-align: left;
    direction: ltr;
  }
  .display .result {
    font-family: 'JetBrains Mono', monospace;
    font-size: 2.8rem;
    font-weight: 700;
    color: var(--text);
    line-height: 1.1;
    word-break: break-all;
    text-align: left;
    direction: ltr;
    transition: color 0.2s;
  }
  .display .result.error { color: #f87171; font-size: 1.5rem; }

  .buttons {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 0.6rem;
  }

  button {
    background: var(--btn);
    border: 1px solid rgba(255,255,255,0.05);
    border-radius: 12px;
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 1.1rem;
    font-weight: 700;
    padding: 1.1rem 0.5rem;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s, box-shadow 0.15s;
    position: relative;
    overflow: hidden;
  }
  button::after {
    content: '';
    position: absolute;
    inset: 0;
    background: white;
    opacity: 0;
    transition: opacity 0.15s;
    border-radius: 12px;
  }
  button:active::after { opacity: 0.05; }
  button:active { transform: scale(0.95); }
  button:hover { background: var(--btn-hover); }

  .btn-op {
    background: rgba(124,58,237,0.2);
    border-color: rgba(124,58,237,0.3);
    color: #a78bfa;
  }
  .btn-op:hover { background: rgba(124,58,237,0.35); }

  .btn-clear {
    background: rgba(239,68,68,0.15);
    border-color: rgba(239,68,68,0.25);
    color: #fca5a5;
  }
  .btn-clear:hover { background: rgba(239,68,68,0.3); }

  .btn-eq {
    background: linear-gradient(135deg, #c084fc, #7c3aed);
    border-color: transparent;
    color: white;
    grid-column: span 2;
    box-shadow: 0 4px 20px rgba(124,58,237,0.4);
  }
  .btn-eq:hover { box-shadow: 0 4px 30px rgba(124,58,237,0.6); filter: brightness(1.1); }

  .btn-zero { grid-column: span 2; }

  .btn-small { font-size: 0.85rem; }

  @keyframes fadeDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>

<nav>
  <a href="index.html">← الرئيسية</a>
</nav>

<div class="calc-wrapper">
  <div class="calc-title">
    <h1>🧮 الآلة الحاسبة</h1>
    <p>علمية متكاملة</p>
  </div>

  <div class="calculator">
    <div class="display">
      <div class="expression" id="expression"></div>
      <div class="result" id="result">0</div>
    </div>

    <div class="buttons">
      <!-- Row 1 -->
      <button class="btn-clear btn-small" onclick="clearAll()">AC</button>
      <button class="btn-op btn-small" onclick="toggleSign()">+/−</button>
      <button class="btn-op btn-small" onclick="percent()">%</button>
      <button class="btn-op" onclick="appendOp('/')">÷</button>

      <!-- Row 2 -->
      <button onclick="appendNum('7')">7</button>
      <button onclick="appendNum('8')">8</button>
      <button onclick="appendNum('9')">9</button>
      <button class="btn-op" onclick="appendOp('*')">×</button>

      <!-- Row 3 -->
      <button onclick="appendNum('4')">4</button>
      <button onclick="appendNum('5')">5</button>
      <button onclick="appendNum('6')">6</button>
      <button class="btn-op" onclick="appendOp('-')">−</button>

      <!-- Row 4 -->
      <button onclick="appendNum('1')">1</button>
      <button onclick="appendNum('2')">2</button>
      <button onclick="appendNum('3')">3</button>
      <button class="btn-op" onclick="appendOp('+')">+</button>

      <!-- Row 5 -->
      <button class="btn-zero" onclick="appendNum('0')">0</button>
      <button onclick="appendDot()">.</button>
      <button class="btn-eq" onclick="calculate()">=</button>
    </div>
  </div>
</div>

<script>
  let expr = '';
  let justCalc = false;

  const exprEl = document.getElementById('expression');
  const resultEl = document.getElementById('result');

  function updateDisplay(val) {
    resultEl.textContent = val;
    resultEl.className = 'result';
  }

  function appendNum(n) {
    if (justCalc) { expr = ''; justCalc = false; }
    expr += n;
    updateDisplay(expr);
    exprEl.textContent = '';
  }

  function appendOp(op) {
    justCalc = false;
    const ops = ['+', '-', '*', '/'];
    if (expr && ops.includes(expr.slice(-1))) {
      expr = expr.slice(0, -1);
    }
    expr += op;
    updateDisplay(expr.replace(/\*/g, '×').replace(/\//g, '÷'));
  }

  function appendDot() {
    if (justCalc) { expr = '0'; justCalc = false; }
    const parts = expr.split(/[\+\-\*\/]/);
    if (!parts[parts.length - 1].includes('.')) {
      if (!expr || /[\+\-\*\/]$/.test(expr)) expr += '0';
      expr += '.';
      updateDisplay(expr);
    }
  }

  function clearAll() {
    expr = '';
    justCalc = false;
    updateDisplay('0');
    exprEl.textContent = '';
  }

  function toggleSign() {
    if (!expr || expr === '0') return;
    if (expr.startsWith('-')) expr = expr.slice(1);
    else expr = '-' + expr;
    updateDisplay(expr);
  }

  function percent() {
    if (!expr) return;
    try {
      expr = String(eval(expr) / 100);
      updateDisplay(expr);
    } catch(e) {}
  }

  function calculate() {
    if (!expr) return;
    try {
      exprEl.textContent = expr.replace(/\*/g, '×').replace(/\//g, '÷') + ' =';
      let result = eval(expr);
      if (!isFinite(result)) throw new Error();
      result = parseFloat(result.toPrecision(12));
      expr = String(result);
      updateDisplay(result.toLocaleString('en'));
      justCalc = true;
    } catch(e) {
      resultEl.textContent = 'خطأ في العملية';
      resultEl.className = 'result error';
      expr = '';
    }
  }

  document.addEventListener('keydown', e => {
    if (e.key >= '0' && e.key <= '9') appendNum(e.key);
    else if (e.key === '+') appendOp('+');
    else if (e.key === '-') appendOp('-');
    else if (e.key === '*') appendOp('*');
    else if (e.key === '/') { e.preventDefault(); appendOp('/'); }
    else if (e.key === '.') appendDot();
    else if (e.key === 'Enter' || e.key === '=') calculate();
    else if (e.key === 'Backspace') { expr = expr.slice(0,-1); updateDisplay(expr||'0'); }
    else if (e.key === 'Escape') clearAll();
  });
</script>
</body>
</html>
