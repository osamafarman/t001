<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEXUS — لعبة الذاكرة</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Tajawal:wght@300;400;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#02040a;--c1:#00f5ff;--c2:#ff2d7a;--c3:#7c3aed;--c4:#00ff88;
  --gold:#ffd700;--text:#e8f4f8;--muted:#3a4a5c;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Tajawal',sans-serif;min-height:100vh;overflow-x:hidden;cursor:none;}
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;
  background:radial-gradient(ellipse 70% 60% at 15% 30%, rgba(255,45,122,.06),transparent 60%),
             radial-gradient(ellipse 50% 50% at 85% 70%, rgba(0,245,255,.05),transparent 60%);
}

#cursor{position:fixed;width:10px;height:10px;background:var(--c2);border-radius:50%;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);box-shadow:0 0 15px var(--c2);}
#cursor-ring{position:fixed;width:36px;height:36px;border:1px solid rgba(255,45,122,.5);border-radius:50%;pointer-events:none;z-index:9998;transform:translate(-50%,-50%);transition:all .1s ease-out;}

nav{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:18px 48px;background:rgba(2,4,10,0.8);backdrop-filter:blur(24px);border-bottom:1px solid rgba(255,45,122,.12);}
.logo{font-family:'Orbitron',monospace;font-weight:900;font-size:18px;color:var(--c1);letter-spacing:4px;text-decoration:none;}
.logo .dot{color:var(--c2);}
nav ul{display:flex;gap:28px;list-style:none;}
nav a:not(.logo){color:var(--muted);text-decoration:none;font-size:12px;font-weight:500;letter-spacing:3px;text-transform:uppercase;transition:color .3s;}
nav a:not(.logo):hover,nav a:not(.logo).active{color:var(--c2);}

main{position:relative;z-index:1;padding:110px 24px 60px;display:flex;flex-direction:column;align-items:center;}
.page-label{font-family:'Orbitron',monospace;font-size:11px;letter-spacing:5px;color:var(--c2);opacity:.7;margin-bottom:28px;}

/* ── TOP BAR ── */
.topbar{
  display:flex;gap:16px;margin-bottom:28px;
  flex-wrap:wrap;justify-content:center;align-items:center;
}
.stat-pill{
  display:flex;align-items:center;gap:10px;
  background:rgba(255,255,255,.03);
  border:1px solid rgba(255,255,255,.06);
  border-radius:100px;padding:10px 22px;
}
.stat-pill .sp-icon{font-size:18px;}
.stat-pill .sp-body{display:flex;flex-direction:column;}
.stat-pill .sp-label{font-size:9px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;}
.stat-pill .sp-val{font-family:'Orbitron',monospace;font-size:18px;font-weight:700;}
#sTimer .sp-val{color:var(--c1);}
#sMoves .sp-val{color:var(--c2);}
#sPairs .sp-val{color:var(--c4);}
#sBest  .sp-val{color:var(--gold);}

/* ── CONTROLS ── */
.controls{display:flex;gap:10px;margin-bottom:32px;flex-wrap:wrap;justify-content:center;}
.diff-btn{
  padding:10px 22px;border-radius:100px;
  background:rgba(255,255,255,.03);color:var(--muted);
  border:1px solid rgba(255,255,255,.07);cursor:pointer;
  font-family:'Tajawal',sans-serif;font-size:14px;font-weight:600;
  transition:all .3s;
}
.diff-btn.active{background:rgba(255,45,122,.12);color:var(--c2);border-color:rgba(255,45,122,.3);}
.start-btn{
  padding:12px 32px;border-radius:100px;border:none;cursor:pointer;
  background:linear-gradient(135deg,var(--c2),#ff6b9d);
  color:#fff;font-family:'Tajawal',sans-serif;font-size:15px;font-weight:700;
  letter-spacing:1px;box-shadow:0 4px 24px rgba(255,45,122,.35);
  transition:all .3s;position:relative;overflow:hidden;
}
.start-btn::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,.2),transparent);
  opacity:0;transition:opacity .3s;
}
.start-btn:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(255,45,122,.5);}
.start-btn:hover::before{opacity:1;}

/* ── BOARD ── */
#board{
  display:grid;gap:12px;
  max-width:620px;width:100%;
  padding:0 8px;
}
.g4{grid-template-columns:repeat(4,1fr);}
.g6{grid-template-columns:repeat(6,1fr);}

/* ── CARDS ── */
.card{aspect-ratio:1;cursor:pointer;position:relative;perspective:800px;}
.card-inner{
  width:100%;height:100%;
  position:relative;transform-style:preserve-3d;
}
.face{
  position:absolute;inset:0;border-radius:14px;
  backface-visibility:hidden;
  display:flex;align-items:center;justify-content:center;
}
.back{
  background:linear-gradient(135deg,rgba(255,45,122,.06),rgba(124,58,237,.06));
  border:1px solid rgba(255,255,255,.07);
}
.back-inner{
  width:60%;height:60%;border-radius:50%;
  background:radial-gradient(circle,rgba(255,45,122,.1),transparent);
  border:1px solid rgba(255,45,122,.15);
  display:flex;align-items:center;justify-content:center;
  font-family:'Orbitron',monospace;font-size:14px;color:rgba(255,45,122,.2);
}
.front{
  transform:rotateY(180deg);
  background:rgba(8,15,28,.97);
  border:1px solid rgba(0,245,255,.2);
  font-size:clamp(20px,5vw,38px);
}

/* Matched style */
.card.matched .front{
  border-color:rgba(0,255,136,.5);
  background:rgba(0,255,136,.05);
  box-shadow:0 0 24px rgba(0,255,136,.25),inset 0 0 20px rgba(0,255,136,.06);
}

/* ── WIN MODAL ── */
.win-overlay{
  display:none;position:fixed;inset:0;z-index:200;
  background:rgba(2,4,10,.9);backdrop-filter:blur(16px);
  align-items:center;justify-content:center;
}
.win-overlay.show{display:flex;}
.win-box{
  text-align:center;
  border:1px solid rgba(0,255,136,.25);
  border-radius:28px;padding:56px 64px;
  background:rgba(5,10,20,.98);
  position:relative;overflow:hidden;
}
.win-box::before{
  content:'';position:absolute;top:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg,transparent,var(--c4),transparent);
}
.win-emoji{font-size:72px;margin-bottom:16px;display:block;}
.win-title{
  font-family:'Orbitron',monospace;font-size:34px;color:var(--c4);
  text-shadow:0 0 40px var(--c4);margin-bottom:28px;
}
.win-stats{
  display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:36px;
}
.win-stat{
  background:rgba(255,255,255,.04);border-radius:14px;padding:14px 20px;
  border:1px solid rgba(255,255,255,.06);
}
.win-stat label{font-size:10px;letter-spacing:2px;color:var(--muted);display:block;margin-bottom:4px;}
.win-stat span{font-family:'Orbitron',monospace;font-size:22px;color:var(--text);}

/* ── PARTICLES CANVAS ── */
#particleCanvas{position:fixed;inset:0;pointer-events:none;z-index:150;}

/* ── LEADERBOARD ── */
.leaderboard{
  margin-top:36px;max-width:500px;width:100%;
  background:rgba(5,10,20,.8);border:1px solid rgba(255,255,255,.06);
  border-radius:20px;padding:24px;
}
.lb-title{
  font-family:'Orbitron',monospace;font-size:11px;letter-spacing:3px;
  color:var(--gold);margin-bottom:16px;
  display:flex;align-items:center;gap:8px;
}
.lb-title::after{content:'';flex:1;height:1px;background:rgba(255,215,0,.2);}
.lb-list{list-style:none;display:flex;flex-direction:column;gap:8px;}
.lb-item{
  display:flex;align-items:center;gap:12px;
  padding:10px 14px;border-radius:12px;
  background:rgba(255,255,255,.02);
  border:1px solid rgba(255,255,255,.04);
  font-size:13px;
}
.lb-rank{
  font-family:'Orbitron',monospace;font-size:14px;
  width:24px;text-align:center;
}
.lb-rank.gold{color:var(--gold);}
.lb-rank.silver{color:#c0c0c0;}
.lb-rank.bronze{color:#cd7f32;}
.lb-info{flex:1;}
.lb-score{font-family:'Orbitron',monospace;font-size:12px;color:var(--c4);}
</style>
</head>
<body>
<div id="cursor"></div>
<div id="cursor-ring"></div>
<canvas id="particleCanvas"></canvas>

<nav>
  <a href="index.html" class="logo">NEX<span class="dot">.</span>US</a>
  <ul>
    <li><a href="calculator.html">الحاسبة</a></li>
    <li><a href="game.html" class="active">اللعبة</a></li>
    <li><a href="flags.html">الأعلام</a></li>
  </ul>
</nav>

<main>
  <div class="page-label">✦ MEMORY CARD GAME ✦</div>

  <div class="topbar">
    <div class="stat-pill" id="sTimer"><span class="sp-icon">⏱</span><div class="sp-body"><span class="sp-label">TIMER</span><span class="sp-val" id="timerVal">00:00</span></div></div>
    <div class="stat-pill" id="sMoves"><span class="sp-icon">🔄</span><div class="sp-body"><span class="sp-label">MOVES</span><span class="sp-val" id="movesVal">0</span></div></div>
    <div class="stat-pill" id="sPairs"><span class="sp-icon">✅</span><div class="sp-body"><span class="sp-label">PAIRS</span><span class="sp-val" id="pairsVal">0</span></div></div>
    <div class="stat-pill" id="sBest"><span class="sp-icon">🏆</span><div class="sp-body"><span class="sp-label">BEST</span><span class="sp-val" id="bestVal">--</span></div></div>
  </div>

  <div class="controls">
    <button class="diff-btn active" id="d4" onclick="setDiff(4,8)">سهل 4×4</button>
    <button class="diff-btn" id="d5" onclick="setDiff(5,10)">متوسط 5×4</button>
    <button class="diff-btn" id="d6" onclick="setDiff(6,12)">صعب 6×4</button>
    <button class="start-btn" onclick="startGame()">▶ ابدأ اللعبة</button>
  </div>

  <div id="board">
    <div style="grid-column:1/-1;text-align:center;padding:60px 20px;color:var(--muted);">
      <div style="font-size:56px;margin-bottom:16px;opacity:.3">🎮</div>
      <p>اختر المستوى واضغط ابدأ</p>
    </div>
  </div>

  <div class="leaderboard" id="leaderboard" style="display:none">
    <div class="lb-title">🏅 قائمة الأفضل</div>
    <ul class="lb-list" id="lbList"></ul>
  </div>
</main>

<div class="win-overlay" id="winOverlay">
  <div class="win-box" id="winBox">
    <span class="win-emoji">🏆</span>
    <div class="win-title">أحسنت!</div>
    <div class="win-stats">
      <div class="win-stat"><label>الوقت</label><span id="wTime">—</span></div>
      <div class="win-stat"><label>الحركات</label><span id="wMoves">—</span></div>
      <div class="win-stat"><label>الأزواج</label><span id="wPairs">—</span></div>
      <div class="win-stat"><label>النقاط</label><span id="wScore" style="color:var(--c4)">—</span></div>
    </div>
    <button class="start-btn" onclick="closeWin()">🔄 العب مجدداً</button>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>

<script>
// ── CURSOR ──
const cur=document.getElementById('cursor'),ring=document.getElementById('cursor-ring');
let mx=0,my=0,rx=0,ry=0;
document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;gsap.to(cur,{x:mx,y:my,duration:.05});});
(function ar(){rx+=(mx-rx)*.1;ry+=(my-ry)*.1;gsap.set(ring,{x:rx,y:ry});requestAnimationFrame(ar);})();

// ── GAME STATE ──
const EMOJIS=['🦁','🐯','🦊','🐺','🦝','🐗','🦌','🐘','🦏','🦛','🐪','🦒','🦓','🦧','🐒','🦅','🦉','🐬','🦈','🐙','🦋','🐉','🌟','🔥','⚡','🌈','💎','🎯','🧬','🎲'];
let cols=4,pairCount=8,moves=0,matched=0,flipped=[],lock=false,started=false,seconds=0,timerInt=null,best={};
let scores=[];

function setDiff(c,p){
  cols=c;pairCount=p;
  document.querySelectorAll('.diff-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('d'+c).classList.add('active');
}

function pad(n){return String(n).padStart(2,'0');}

function startGame(){
  clearInterval(timerInt);
  moves=0;matched=0;flipped=[];lock=false;started=false;seconds=0;
  document.getElementById('timerVal').textContent='00:00';
  document.getElementById('movesVal').textContent='0';
  document.getElementById('pairsVal').textContent='0';

  const set=shuffle([...EMOJIS].slice(0,pairCount));
  const cards=shuffle([...set,...set]);

  const board=document.getElementById('board');
  board.className='g'+cols;
  board.innerHTML='';

  cards.forEach((emoji,i)=>{
    const card=document.createElement('div');
    card.className='card';
    card.dataset.emoji=emoji;
    card.innerHTML=`
      <div class="card-inner" id="ci_${i}">
        <div class="face back"><div class="back-inner">?</div></div>
        <div class="face front">${emoji}</div>
      </div>`;
    card.addEventListener('click',()=>flipCard(card,i));
    board.appendChild(card);

    // Deal animation
    gsap.fromTo(card,
      {opacity:0,scale:.5,rotation:Math.random()*20-10},
      {opacity:1,scale:1,rotation:0,duration:.4,delay:i*.04,ease:'back.out(1.4)'}
    );
  });
}

function flipCard(card,idx){
  if(lock||card.classList.contains('matched')) return;
  if(flipped.length===1&&flipped[0]===card) return;

  if(!started){
    started=true;
    timerInt=setInterval(()=>{
      seconds++;
      document.getElementById('timerVal').textContent=`${pad(Math.floor(seconds/60))}:${pad(seconds%60)}`;
      // Pulse timer when > 60s
      if(seconds%10===0) gsap.fromTo('#sTimer',{scale:1.08},{scale:1,duration:.3,ease:'elastic.out(1,.5)'});
    },1000);
  }

  // GSAP 3D flip
  gsap.to(`#ci_${idx}`,{
    rotationY:180, duration:.5, ease:'power2.inOut',
    transformPerspective:800
  });

  card.flippedState=true;
  flipped.push(card);

  if(flipped.length===2){
    moves++;
    gsap.fromTo('#sMoves',{scale:1.1},{scale:1,duration:.3,ease:'elastic.out(1,.5)'});
    document.getElementById('movesVal').textContent=moves;
    lock=true;

    const [a,b]=flipped;
    const ai=parseInt(a.querySelector('.card-inner').id.split('_')[1]);
    const bi=parseInt(b.querySelector('.card-inner').id.split('_')[1]);

    if(a.dataset.emoji===b.dataset.emoji){
      setTimeout(()=>{
        a.classList.add('matched');b.classList.add('matched');
        // Bounce on match
        gsap.to([a,b],{scale:1.15,duration:.15,yoyo:true,repeat:1,ease:'power2.out'});
        matched++;
        document.getElementById('pairsVal').textContent=matched;

        // Particle burst via anime.js
        const rect=b.getBoundingClientRect();
        burstParticles(rect.left+rect.width/2, rect.top+rect.height/2);

        flipped=[];lock=false;
        if(matched===pairCount) setTimeout(showWin,500);
      },300);
    } else {
      // Shake mismatch
      setTimeout(()=>{
        [ai,bi].forEach(id=>{
          gsap.to(`#ci_${id}`,{
            x:[-8,8,-6,6,0],duration:.4,ease:'none',
            onComplete:()=>{
              gsap.to(`#ci_${id}`,{rotationY:0,duration:.4,ease:'power2.inOut',transformPerspective:800});
            }
          });
        });
        [a,b].forEach(c=>c.flippedState=false);
        flipped=[];lock=false;
      },900);
    }
  }
}

// ── ANIME.JS PARTICLE BURST ──
function burstParticles(x,y){
  const canvas=document.getElementById('particleCanvas');
  canvas.width=window.innerWidth; canvas.height=window.innerHeight;
  const ctx=canvas.getContext('2d');
  const particles=[];
  const colors=['#00f5ff','#ff2d7a','#00ff88','#ffd700','#a78bfa','#fff'];

  for(let i=0;i<32;i++){
    const angle=Math.random()*Math.PI*2;
    const speed=2+Math.random()*6;
    particles.push({
      x,y,
      vx:Math.cos(angle)*speed,
      vy:Math.sin(angle)*speed,
      r:3+Math.random()*5,
      color:colors[Math.floor(Math.random()*colors.length)],
      alpha:1,life:1
    });
  }

  anime({
    duration:800,
    easing:'linear',
    update:function(anim){
      ctx.clearRect(0,0,canvas.width,canvas.height);
      const p=anim.progress/100;
      particles.forEach(pt=>{
        pt.x+=pt.vx*(1-p*0.5);
        pt.y+=pt.vy*(1-p*0.5);
        pt.vy+=0.15;
        pt.alpha=1-p;
        ctx.globalAlpha=pt.alpha;
        ctx.fillStyle=pt.color;
        ctx.beginPath();
        ctx.arc(pt.x,pt.y,pt.r*(1-p*.5),0,Math.PI*2);
        ctx.fill();
      });
    },
    complete:()=>ctx.clearRect(0,0,canvas.width,canvas.height)
  });
}

// ── WIN ──
function showWin(){
  clearInterval(timerInt);
  const score=Math.max(100,Math.floor((pairCount*1000)/moves*(100/seconds)*10));
  scores.push({time:seconds,moves,pairs:pairCount,score,diff:cols===4?'سهل':cols===5?'متوسط':'صعب'});
  scores.sort((a,b)=>b.score-a.score);
  if(scores.length>5) scores.length=5;

  // Update best
  const key='d'+cols;
  if(!best[key]||seconds<best[key]) best[key]=seconds;
  document.getElementById('bestVal').textContent=`${pad(Math.floor(best[key]/60))}:${pad(best[key]%60)}`;

  document.getElementById('wTime').textContent=`${pad(Math.floor(seconds/60))}:${pad(seconds%60)}`;
  document.getElementById('wMoves').textContent=moves;
  document.getElementById('wPairs').textContent=pairCount;
  document.getElementById('wScore').textContent=score;

  const ov=document.getElementById('winOverlay');
  ov.classList.add('show');

  // Win box entrance
  gsap.fromTo('#winBox',{scale:.6,rotation:-5,opacity:0},{scale:1,rotation:0,opacity:1,duration:.7,ease:'back.out(1.7)'});

  // Big confetti burst
  for(let i=0;i<6;i++){
    setTimeout(()=>{
      burstParticles(Math.random()*innerWidth, Math.random()*innerHeight*.5);
    },i*120);
  }

  // Update leaderboard
  updateLeaderboard();
}

function updateLeaderboard(){
  if(scores.length===0) return;
  const lb=document.getElementById('leaderboard');
  lb.style.display='block';
  const ranks=['gold','silver','bronze'];
  document.getElementById('lbList').innerHTML=scores.slice(0,5).map((s,i)=>`
    <li class="lb-item">
      <span class="lb-rank ${ranks[i]||''}">${i+1}</span>
      <div class="lb-info">
        <div>${s.diff} · ${pad(Math.floor(s.time/60))}:${pad(s.time%60)} · ${s.moves} حركة</div>
      </div>
      <span class="lb-score">${s.score} pts</span>
    </li>`).join('');
  gsap.from('#lbList li',{opacity:0,x:20,stagger:.1,duration:.4,ease:'power2.out'});
}

function closeWin(){
  gsap.to('#winBox',{scale:.5,opacity:0,duration:.3,ease:'power2.in',onComplete:()=>{
    document.getElementById('winOverlay').classList.remove('show');
    startGame();
  }});
}

function shuffle(arr){
  for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}
  return arr;
}
</script>
</body>
</html>
