<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لعبة الذاكرة — ثلاثية</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #020d1a;
    --panel: #071524;
    --card-back: #0e2338;
    --card-border: #1e4060;
    --accent: #38bdf8;
    --accent2: #0ea5e9;
    --matched: #4ade80;
    --text: #f0f0f8;
    --muted: #5a8099;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    font-family: 'Tajawal', sans-serif;
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 1.5rem 1rem;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse 60% 50% at 50% -10%, rgba(56,189,248,0.12) 0%, transparent 60%);
    pointer-events: none;
  }

  nav {
    position: fixed;
    top: 1.5rem;
    right: 1.5rem;
    z-index: 10;
  }
  nav a {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    color: var(--muted);
    text-decoration: none;
    font-size: 0.85rem;
    padding: 0.5rem 1rem;
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 50px;
    background: rgba(255,255,255,0.03);
    transition: color 0.2s, border-color 0.2s;
  }
  nav a:hover { color: var(--accent); border-color: rgba(56,189,248,0.3); }

  .game-header {
    text-align: center;
    margin: 1rem 0 1.5rem;
    position: relative;
    z-index: 1;
    animation: fadeDown 0.6s ease both;
  }
  .game-header h1 { font-size: 1.8rem; font-weight: 900; color: var(--accent); }
  .game-header p { font-size: 0.85rem; color: var(--muted); }

  .stats {
    display: flex;
    gap: 1rem;
    margin-bottom: 1.5rem;
    position: relative;
    z-index: 1;
    animation: fadeDown 0.6s ease 0.1s both;
  }
  .stat {
    background: var(--panel);
    border: 1px solid rgba(56,189,248,0.15);
    border-radius: 12px;
    padding: 0.75rem 1.25rem;
    text-align: center;
    min-width: 90px;
  }
  .stat-val { font-size: 1.5rem; font-weight: 900; color: var(--accent); }
  .stat-lbl { font-size: 0.7rem; color: var(--muted); }

  .board {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 0.75rem;
    max-width: 440px;
    width: 100%;
    position: relative;
    z-index: 1;
    animation: fadeUp 0.6s ease 0.2s both;
  }

  .card {
    aspect-ratio: 1;
    perspective: 600px;
    cursor: pointer;
  }
  .card-inner {
    width: 100%;
    height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.4s cubic-bezier(0.23, 1, 0.32, 1);
    border-radius: 12px;
  }
  .card.flipped .card-inner { transform: rotateY(180deg); }
  .card.matched .card-inner { transform: rotateY(180deg); }

  .card-face {
    position: absolute;
    inset: 0;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
  }

  .card-back {
    background: var(--card-back);
    border: 1px solid var(--card-border);
    font-size: 1.5rem;
    color: rgba(56,189,248,0.3);
  }
  .card-back::after { content: '?'; font-weight: 900; }

  .card-front {
    background: linear-gradient(135deg, #0e2f4f, #0a1a2e);
    border: 1px solid rgba(56,189,248,0.3);
    transform: rotateY(180deg);
    font-size: 2.2rem;
    box-shadow: inset 0 0 20px rgba(56,189,248,0.05);
  }
  .card.matched .card-front {
    background: linear-gradient(135deg, #0a2e12, #061a08);
    border-color: rgba(74,222,128,0.4);
    box-shadow: 0 0 20px rgba(74,222,128,0.2);
    animation: pulse-green 0.5s ease;
  }

  .btn-restart {
    margin-top: 1.5rem;
    padding: 0.85rem 2.5rem;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none;
    border-radius: 50px;
    color: var(--bg);
    font-family: 'Tajawal', sans-serif;
    font-size: 1rem;
    font-weight: 900;
    cursor: pointer;
    position: relative;
    z-index: 1;
    transition: transform 0.2s, box-shadow 0.2s;
    box-shadow: 0 4px 20px rgba(56,189,248,0.3);
  }
  .btn-restart:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(56,189,248,0.5); }
  .btn-restart:active { transform: translateY(0); }

  .win-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(2,13,26,0.9);
    z-index: 100;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 1rem;
    text-align: center;
  }
  .win-overlay.show { display: flex; animation: fadeIn 0.4s ease; }
  .win-overlay h2 { font-size: 3rem; font-weight: 900; color: var(--matched); }
  .win-overlay p { font-size: 1.1rem; color: var(--muted); }

  @keyframes fadeDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes pulse-green { 0%,100% { transform: rotateY(180deg) scale(1); } 50% { transform: rotateY(180deg) scale(1.08); } }
</style>
</head>
<body>

<nav><a href="index.html">← الرئيسية</a></nav>

<div class="game-header">
  <h1>🎮 لعبة الذاكرة</h1>
  <p>اكتشف الأزواج المتطابقة</p>
</div>

<div class="stats">
  <div class="stat"><div class="stat-val" id="moves">0</div><div class="stat-lbl">محاولة</div></div>
  <div class="stat"><div class="stat-val" id="matched-count">0</div><div class="stat-lbl">مكتشف</div></div>
  <div class="stat"><div class="stat-val" id="timer">0</div><div class="stat-lbl">ثانية</div></div>
</div>

<div class="board" id="board"></div>

<button class="btn-restart" onclick="initGame()">🔄 لعبة جديدة</button>

<div class="win-overlay" id="winOverlay">
  <div style="font-size:4rem">🎉</div>
  <h2>أحسنت!</h2>
  <p id="win-msg"></p>
  <button class="btn-restart" onclick="initGame(); document.getElementById('winOverlay').classList.remove('show')">العب مجدداً</button>
</div>

<script>
  const emojis = ['🐉','🦊','🐬','🦋','🌺','⚡','🍎','🎸','🏆','🌙','🔮','💎','🚀','🦁','🌊','🎯'];
  let flipped = [], matched = 0, moves = 0, lock = false, timerInt, secs = 0;

  function shuffle(arr) {
    let a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i+1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  function initGame() {
    clearInterval(timerInt);
    secs = 0; moves = 0; matched = 0; flipped = []; lock = false;
    document.getElementById('moves').textContent = '0';
    document.getElementById('matched-count').textContent = '0';
    document.getElementById('timer').textContent = '0';

    const pairs = shuffle([...emojis, ...emojis]);
    const board = document.getElementById('board');
    board.innerHTML = '';
    pairs.forEach((emoji, i) => {
      const card = document.createElement('div');
      card.className = 'card';
      card.dataset.emoji = emoji;
      card.dataset.index = i;
      card.innerHTML = `<div class="card-inner"><div class="card-face card-back"></div><div class="card-face card-front">${emoji}</div></div>`;
      card.addEventListener('click', () => flipCard(card));
      board.appendChild(card);
    });

    timerInt = setInterval(() => {
      secs++;
      document.getElementById('timer').textContent = secs;
    }, 1000);
  }

  function flipCard(card) {
    if (lock || card.classList.contains('flipped') || card.classList.contains('matched')) return;
    card.classList.add('flipped');
    flipped.push(card);
    if (flipped.length === 2) {
      lock = true;
      moves++;
      document.getElementById('moves').textContent = moves;
      if (flipped[0].dataset.emoji === flipped[1].dataset.emoji) {
        flipped.forEach(c => c.classList.add('matched'));
        matched++;
        document.getElementById('matched-count').textContent = matched;
        flipped = []; lock = false;
        if (matched === 16) {
          clearInterval(timerInt);
          setTimeout(() => {
            document.getElementById('win-msg').textContent = `أتممت اللعبة في ${moves} محاولة و${secs} ثانية!`;
            document.getElementById('winOverlay').classList.add('show');
          }, 500);
        }
      } else {
        setTimeout(() => {
          flipped.forEach(c => c.classList.remove('flipped'));
          flipped = []; lock = false;
        }, 900);
      }
    }
  }

  initGame();
</script>
</body>
</html>
